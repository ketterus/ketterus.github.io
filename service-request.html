<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ketter Home Improvements | Service Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .request-wrap { max-width: 880px; margin: 40px auto; }
    .card { border: 0; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    .required::after { content: " *"; color: #dc3545; }
    #submitStatus { display: none; }
  </style>
</head>
<body>
  <div class="container request-wrap">
    <div class="card">
      <div class="card-body p-4 p-md-5">
        <div class="mb-4">
          <h1 class="h2 mb-2">Request Service</h1>
          <p class="text-muted mb-0">Send the job details and we will review the request as quickly as possible.</p>
        </div>

        <div id="submitStatus" class="alert" role="alert"></div>

        <form
  id="serviceRequestForm"
  action="https://script.google.com/macros/s/AKfycbzsoQOa9-F0XV7iV1D5Ww-tAry5ke-e3x95U3KM17OOahph-60isfP3AaPcVxyb-Geu2Q/exec"
  method="post"
  target="hidden_iframe"
  novalidate
>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label required" for="RequesterName">Full Name</label>
              <input class="form-control" id="RequesterName" name="RequesterName" required>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="RequesterRelationship">Relationship to Property</label>
              <input class="form-control" id="RequesterRelationship" name="RequesterRelationship" placeholder="Owner, tenant, manager, etc.">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="RequesterEmail">Email</label>
              <input class="form-control" id="RequesterEmail" name="RequesterEmail" type="email">
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="RequesterPhone">Phone</label>
              <input class="form-control" id="RequesterPhone" name="RequesterPhone" type="tel" required>
            </div>

            <div class="col-md-4">
              <label class="form-label" for="TextOK">Text OK</label>
              <select class="form-select" id="TextOK" name="TextOK">
                <option value="">Select...</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label" for="Urgency">Urgency</label>
              <select class="form-select" id="Urgency" name="Urgency">
                <option value="">Select...</option>
                <option value="Routine">Routine</option>
                <option value="Soon">Soon</option>
                <option value="Urgent">Urgent</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label" for="BestContactTime">Best Contact Time</label>
              <input class="form-control" id="BestContactTime" name="BestContactTime" placeholder="Morning, afternoon, 3-5 PM, etc.">
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="ServiceType">Service Type</label>
              <select class="form-select" id="ServiceType" name="ServiceType" required>
                <option value="">Select service...</option>
                <option value="General Repair">General Repair</option>
                <option value="Property Maintenance">Property Maintenance</option>
                <option value="Installations">Installations</option>
                <option value="Interior Improvements">Interior Improvements</option>
                <option value="Rental Turnover Work">Rental Turnover Work</option>
                <option value="Custom Request">Custom Request</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="PropertyOccupied">Property Occupied</label>
              <select class="form-select" id="PropertyOccupied" name="PropertyOccupied">
                <option value="">Select...</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="Unknown">Unknown</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label required" for="ServiceAddress">Service Address</label>
              <input class="form-control" id="ServiceAddress" name="ServiceAddress" required>
            </div>

            <div class="col-12">
              <label class="form-label" for="BillingAddress">Billing Address</label>
              <input class="form-control" id="BillingAddress" name="BillingAddress">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="PermissionToEnter">Permission to Enter</label>
              <select class="form-select" id="PermissionToEnter" name="PermissionToEnter">
                <option value="">Select...</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="Call First">Call First</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="OnSiteContactName">On-Site Contact Name</label>
              <input class="form-control" id="OnSiteContactName" name="OnSiteContactName">
            </div>

            <div class="col-md-6">
              <label class="form-label" for="OnSiteContactPhone">On-Site Contact Phone</label>
              <input class="form-control" id="OnSiteContactPhone" name="OnSiteContactPhone" type="tel">
            </div>

            <div class="col-12">
              <label class="form-label required" for="IssueDescription">Describe the Issue</label>
              <textarea class="form-control" id="IssueDescription" name="IssueDescription" rows="5" required></textarea>
            </div>

            <div class="col-12 pt-2">
              <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">Submit Request</button>
            </div>
          </div>
        </form>
        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
      </div>
    </div>
  </div>

<script>
  const form = document.getElementById("serviceRequestForm");
  const submitBtn = document.getElementById("submitBtn");
  const submitStatus = document.getElementById("submitStatus");

  function showStatus(type, message) {
    submitStatus.className = `alert alert-${type}`;
    submitStatus.textContent = message;
    submitStatus.style.display = "block";
  }

  form.addEventListener("submit", function (e) {
    submitStatus.style.display = "none";

    if (!form.checkValidity()) {
      e.preventDefault();
      form.classList.add("was-validated");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    setTimeout(function () {
      showStatus("success", "Request submitted. Please allow a few seconds, then verify it reached the system.");
      form.reset();
      form.classList.remove("was-validated");
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Request";
    }, 1500);
  });
</script>
</body>
</html>
