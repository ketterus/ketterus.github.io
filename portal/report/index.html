<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ketter Home Improvements | Project Report</title>
  <link href="/assets/css/site.css" rel="stylesheet">
  <style>
    .report-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .report-shell,
    .report-section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      margin-bottom: 1rem;
    }

    .report-title {
      margin: 0 0 .35rem;
    }

    .report-subtitle {
      margin: 0;
      color: #666;
      font-weight: 600;
    }

    .report-status {
      margin: 0 0 1rem;
      font-weight: 600;
    }

    .report-error {
      color: #8b1e1e;
    }

    .report-muted {
      color: #666;
    }

    .report-header-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .report-link {
      display: inline-block;
      padding: .6rem .9rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      background: #fff;
      margin-bottom: .25rem;
    }

    .section-title {
      margin: 0 0 1rem;
    }

    .section-summary {
      margin: 0 0 1rem;
      color: #666;
      font-weight: 600;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .field-label {
      margin: 0 0 .25rem;
      font-size: .9rem;
      color: #666;
    }

    .field-value {
      margin: 0;
      font-weight: 600;
      word-break: break-word;
    }

    .paragraph-text,
    .empty-message {
      margin: 0;
      line-height: 1.5;
      color: #444;
      white-space: pre-wrap;
    }

    .item-list {
      display: grid;
      gap: .75rem;
    }

    .item-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem;
      background: #fafafa;
    }

    .item-title {
      margin: 0 0 .4rem;
      font-weight: 700;
    }

    .item-meta-inline {
      margin: 0;
      color: #555;
      line-height: 1.45;
    }

    .item-summary {
      margin: .35rem 0 0;
      color: #666;
      white-space: pre-wrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
    }

    .report-table th,
    .report-table td {
      padding: .7rem;
      border-bottom: 1px solid #e5e5e5;
      text-align: left;
      vertical-align: top;
    }

    .report-table th {
      font-weight: 700;
      white-space: nowrap;
    }

    .expense-group {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
      padding: 1rem;
      margin-bottom: .85rem;
    }

    .expense-header {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) minmax(120px, .7fr) minmax(120px, .7fr);
      gap: 1rem;
      align-items: start;
      margin-bottom: .75rem;
    }

    .expense-vendor {
      margin: 0;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .expense-meta {
      margin: 0;
      color: #555;
    }

    .allocation-list {
      border-top: 1px solid #e5e5e5;
      padding-top: .75rem;
      display: grid;
      gap: .6rem;
    }

    .allocation-row {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) minmax(120px, .7fr);
      gap: 1rem;
      align-items: start;
      padding-left: 1rem;
      border-left: 3px solid #ddd;
    }

    .allocation-label {
      margin: 0;
      font-weight: 600;
      color: #444;
    }

    .allocation-amount {
      margin: 0;
      font-weight: 600;
      color: #222;
    }
  </style>
</head>
<body>
  <main class="report-wrap">
    <section class="report-shell">
      <div id="report-status" class="report-status">Checking access...</div>
      <div id="report-body" class="report-muted">Please wait.</div>
      <div id="report-sections"></div>
    </section>
  </main>

  <script>
    const PORTAL_API_URL = "https://script.google.com/macros/s/AKfycbwEJZwTBLy56OvlOLdICxNhePNZPNODmn3rELZ39ogw1VRBg1RGKLwOz3c2ny2G88WAlA/exec";

    const reportTemplate = [
      {
        key: "projectOverview",
        title: "Project Overview",
        type: "fields",
        fields: [
          { label: "Project Name", path: "project.ProjectName" },
          { label: "Status", path: "project.Status" },
          { label: "Address", path: "project.ProjectAddress" },
          { label: "City", path: "project.City" },
          { label: "State", path: "project.State" },
          { label: "ZIP", path: "project.Zip" },
          { label: "Start Date", path: "project.StartDate", format: "date" },
          { label: "End Date", path: "project.EndDate", format: "date" }
        ]
      },
      {
        key: "projectScope",
        title: "Project Scope",
        type: "paragraph",
        path: "project.Notes",
        hideIfEmpty: true,
        emptyMessage: "No project scope is available."
      },
      {
        key: "documents",
        title: "Documents",
        type: "cards",
        source: "collections.documents",
        hideIfEmpty: true,
        emptyMessage: "No documents are available.",
        cardTitle: "DisplayName",
        meta: [
          { label: "Type", key: "DocumentType" },
          { label: "Status", key: "DocumentStatus" },
          { label: "Created", key: "CreatedDateTime", format: "date" }
        ],
        summary: ""
      },
      {
        key: "timeEntries",
        title: "Time Entries",
        type: "table",
        source: "collections.timeEntries",
        hideIfEmpty: true,
        emptyMessage: "No time entries are available.",
        summaryFn: buildTimeEntriesSummary,
        columns: [
          { label: "Date", key: "TimeDate", format: "date" },
          { label: "Worker", key: "WorkerName" },
          { label: "Hours", key: "HoursWorked" },
          { label: "Description", key: "Description" }
        ]
      },
      {
        key: "expensesCombined",
        title: "Expenses",
        type: "custom",
        render: renderExpensesCombinedSection
      },
      {
        key: "serviceRequests",
        title: "Related Service Requests",
        type: "cards",
        source: "collections.serviceRequests",
        hideIfEmpty: true,
        emptyMessage: "No related service requests are available.",
        cardTitle: "ServiceType",
        condensed: true,
        meta: [
          { label: "Created", key: "CreatedDateTime", format: "date" },
          { label: "Status", key: "Status" },
          { label: "Urgency", key: "Urgency" }
        ],
        summary: "IssueDescription"
      },
      {
        key: "reportTotals",
        title: "Report Totals",
        type: "custom",
        render: renderReportTotalsSection
      }
    ];

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        token: (params.get("t") || "").trim(),
        projectId: (params.get("p") || "").trim()
      };
    }

    async function loadReport() {
      const statusEl = document.getElementById("report-status");
      const bodyEl = document.getElementById("report-body");
      const sectionsEl = document.getElementById("report-sections");
      const { token, projectId } = getParams();

      if (!token) {
        statusEl.textContent = "Access denied";
        bodyEl.innerHTML = '<p class="report-error">This link is missing an access token.</p>';
        sectionsEl.innerHTML = "";
        return;
      }

      if (!projectId) {
        statusEl.textContent = "Project not found";
        bodyEl.innerHTML = `
          <p class="report-error">This link is missing a project selection.</p>
          <a class="report-link" href="/portal/?t=${encodeURIComponent(token)}">Back to Projects</a>
        `;
        sectionsEl.innerHTML = "";
        return;
      }

      try {
        const url = PORTAL_API_URL + "?t=" + encodeURIComponent(token) + "&p=" + encodeURIComponent(projectId);
        const response = await fetch(url, { method: "GET" });
        const data = await response.json();

        if (!data.success) {
          statusEl.textContent = "Access denied";
          bodyEl.innerHTML = '<p class="report-error">' + escapeHtml(data.message || "Access failed.") + '</p>';
          sectionsEl.innerHTML = "";
          return;
        }

        statusEl.style.display = "none";
        bodyEl.innerHTML = `
          <div class="report-header-bar">
            <div>
              <p class="report-subtitle">Project Report for:</p>
              <h1 class="report-title">${escapeHtml(read(data, "project.ProjectName") || "Project Report")}</h1>
            </div>
            <div>
              <a class="report-link" href="/portal/?t=${encodeURIComponent(token)}">Back to Projects</a>
            </div>
          </div>
        `;

        sectionsEl.innerHTML = renderTemplate(reportTemplate, data);
      } catch (error) {
        statusEl.textContent = "Service unavailable";
        bodyEl.innerHTML = '<p class="report-error">Unable to load report right now.</p>';
        sectionsEl.innerHTML = "";
      }
    }

    function renderTemplate(template, data) {
      const sections = template
        .map(section => renderSection(section, data))
        .filter(Boolean);

      if (!sections.length) {
        return `
          <section class="report-section">
            <h2 class="section-title">Report</h2>
            <p class="empty-message">No report sections are available yet.</p>
          </section>
        `;
      }

      return sections.join("");
    }

    function renderSection(section, data) {
      if (section.type === "fields") return renderFieldsSection(section, data);
      if (section.type === "paragraph") return renderParagraphSection(section, data);
      if (section.type === "cards") return renderCardsSection(section, data);
      if (section.type === "table") return renderTableSection(section, data);
      if (section.type === "custom") return section.render(section, data);
      return "";
    }

    function renderFieldsSection(section, data) {
      const fields = (section.fields || []).filter(field => hasValue(read(data, field.path)));
      if (!fields.length && section.hideIfEmpty) return "";

      const content = fields.length
        ? `
          <div class="field-grid">
            ${fields.map(field => `
              <div>
                <p class="field-label">${escapeHtml(field.label || "")}</p>
                <p class="field-value">${escapeHtml(formatValue(read(data, field.path), field.format))}</p>
              </div>
            `).join("")}
          </div>
        `
        : `<p class="empty-message">${escapeHtml(section.emptyMessage || "No information is available.")}</p>`;

      return `
        <section class="report-section">
          <h2 class="section-title">${escapeHtml(section.title || "Section")}</h2>
          ${content}
        </section>
      `;
    }

    function renderParagraphSection(section, data) {
      const value = read(data, section.path);
      if (!hasValue(value) && section.hideIfEmpty) return "";

      return `
        <section class="report-section">
          <h2 class="section-title">${escapeHtml(section.title || "Section")}</h2>
          <p class="paragraph-text">${escapeHtml(hasValue(value) ? String(value) : (section.emptyMessage || "No information is available."))}</p>
        </section>
      `;
    }

    function renderCardsSection(section, data) {
      const items = read(data, section.source) || [];
      if ((!Array.isArray(items) || !items.length) && section.hideIfEmpty) return "";

      const content = Array.isArray(items) && items.length
        ? `
          <div class="item-list">
            ${items.map(item => {
              const metaText = (section.meta || [])
                .map(meta => {
                  const value = formatValue(item[meta.key], meta.format);
                  return hasValue(value) ? `${meta.label}: ${value}` : "";
                })
                .filter(Boolean)
                .join(" • ");

              return `
                <div class="item-card">
                  <p class="item-title">${escapeHtml(item[section.cardTitle] || "Item")}</p>
                  ${metaText ? `<p class="item-meta-inline">${escapeHtml(metaText)}</p>` : ""}
                  ${section.summary && hasValue(item[section.summary]) ? `<p class="item-summary">${escapeHtml(item[section.summary])}</p>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        `
        : `<p class="empty-message">${escapeHtml(section.emptyMessage || "No items are available.")}</p>`;

      return `
        <section class="report-section">
          <h2 class="section-title">${escapeHtml(section.title || "Section")}</h2>
          ${content}
        </section>
      `;
    }

    function renderTableSection(section, data) {
      const items = read(data, section.source) || [];
      if ((!Array.isArray(items) || !items.length) && section.hideIfEmpty) return "";

      const summary = typeof section.summaryFn === "function" ? section.summaryFn(items) : "";

      const content = Array.isArray(items) && items.length
        ? `
          ${summary ? `<p class="section-summary">${escapeHtml(summary)}</p>` : ""}
          <div class="table-wrap">
            <table class="report-table">
              <thead>
                <tr>
                  ${(section.columns || []).map(col => `<th>${escapeHtml(col.label)}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${items.map(item => `
                  <tr>
                    ${(section.columns || []).map(col => `
                      <td>${escapeHtml(formatValue(item[col.key], col.format))}</td>
                    `).join("")}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `
        : `<p class="empty-message">${escapeHtml(section.emptyMessage || "No items are available.")}</p>`;

      return `
        <section class="report-section">
          <h2 class="section-title">${escapeHtml(section.title || "Section")}</h2>
          ${content}
        </section>
      `;
    }

function renderExpensesCombinedSection(section, data) {
  const expenses = read(data, "collections.expenses") || [];
  const allocations = read(data, "collections.expenseAllocations") || [];

  if ((!Array.isArray(expenses) || !expenses.length) && (!Array.isArray(allocations) || !allocations.length)) {
    return "";
  }

  const allocationMap = {};
  allocations.forEach(item => {
    const expenseId = String(item.ExpenseID || item.expenseId || "").trim();
    if (!expenseId) return;
    if (!allocationMap[expenseId]) allocationMap[expenseId] = [];
    allocationMap[expenseId].push(item);
  });

  const totalExpenses = expenses.reduce((sum, item) => {
    const amount = Number(item.TotalAmount ?? item.totalAmount ?? 0);
    return sum + (Number.isNaN(amount) ? 0 : amount);
  }, 0);

  const totalAllocated = allocations.reduce((sum, item) => {
    const amount = Number(item.AllocatedAmount ?? item.allocatedAmount ?? 0);
    return sum + (Number.isNaN(amount) ? 0 : amount);
  }, 0);

  return `
    <section class="report-section">
      <h2 class="section-title">Expenses</h2>
      <p class="section-summary">
        Total Expenses: ${escapeHtml(formatCurrency(totalExpenses))} •
        Total Allocated: ${escapeHtml(formatCurrency(totalAllocated))}
      </p>
      <div>
        ${expenses.map(item => {
          const expenseId = String(item.ExpenseID || item.expenseId || "").trim();
          const relatedAllocations = allocationMap[expenseId] || [];
          const vendorLabel =
            item.VendorName ||
            item.vendorName ||
            item.VendorRef ||
            item.vendorRef ||
            item.VendorID ||
            item.vendorId ||
            "Vendor not set";
          const amount = item.TotalAmount ?? item.totalAmount ?? "";
          const date = item.ExpenseDate ?? item.expenseDate ?? "";

          return `
            <div class="expense-group">
              <div class="expense-header">
                <div>
                  <p class="expense-vendor">${escapeHtml(String(vendorLabel))}</p>
                </div>
                <div>
                  <p class="expense-meta">${escapeHtml(formatValue(date, "date"))}</p>
                </div>
                <div>
                  <p class="expense-meta">${escapeHtml(formatValue(amount, "currency"))}</p>
                </div>
              </div>

              <div class="allocation-list">
                ${relatedAllocations.length
                  ? relatedAllocations.map(allocation => `
                    <div class="allocation-row">
                      <p class="allocation-label">${escapeHtml(String(item.Description ?? item.description ?? "Allocation"))}</p>
                      <p class="allocation-amount">${escapeHtml(formatValue(allocation.AllocatedAmount ?? allocation.allocatedAmount, "currency"))}</p>
                    </div>
                  `).join("")
                  : `
                    <div class="allocation-row">
                      <p class="allocation-label">${escapeHtml(String(item.Description ?? item.description ?? "Expense"))}</p>
                      <p class="allocation-amount">${escapeHtml(formatValue(amount, "currency"))}</p>
                    </div>
                  `
                }
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </section>
  `;
}

    function renderReportTotalsSection(section, data) {
      const timeEntries = read(data, "collections.timeEntries") || [];
      const expenses = read(data, "collections.expenses") || [];
      const allocations = read(data, "collections.expenseAllocations") || [];
      const documents = read(data, "collections.documents") || [];
      const serviceRequests = read(data, "collections.serviceRequests") || [];

      const totalHours = timeEntries.reduce((sum, item) => {
        const hours = Number(item.HoursWorked ?? item.hoursWorked ?? 0);
        return sum + (Number.isNaN(hours) ? 0 : hours);
      }, 0);

      const totalLaborValue = timeEntries.reduce((sum, item) => {
        const hours = Number(item.HoursWorked ?? item.hoursWorked ?? 0);
        const rate = Number(item.HourlyRate ?? item.hourlyRate ?? 0);
        if (Number.isNaN(hours) || Number.isNaN(rate)) return sum;
        return sum + (hours * rate);
      }, 0);

      const totalExpenses = expenses.reduce((sum, item) => {
        const amount = Number(item.TotalAmount ?? item.totalAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      const totalAllocated = allocations.reduce((sum, item) => {
        const amount = Number(item.AllocatedAmount ?? item.allocatedAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      return `
        <section class="report-section">
          <h2 class="section-title">Report Totals</h2>
          <div class="field-grid">
            <div>
              <p class="field-label">Total Time Entries</p>
              <p class="field-value">${escapeHtml(String(timeEntries.length))}</p>
            </div>
            <div>
              <p class="field-label">Total Hours</p>
              <p class="field-value">${escapeHtml(formatNumber(totalHours))}</p>
            </div>
            <div>
              <p class="field-label">Estimated Labor Value</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalLaborValue))}</p>
            </div>
            <div>
              <p class="field-label">Total Expenses</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalExpenses))}</p>
            </div>
            <div>
              <p class="field-label">Total Allocated</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalAllocated))}</p>
            </div>
            <div>
              <p class="field-label">Document Count</p>
              <p class="field-value">${escapeHtml(String(documents.length))}</p>
            </div>
            <div>
              <p class="field-label">Related Service Requests</p>
              <p class="field-value">${escapeHtml(String(serviceRequests.length))}</p>
            </div>
          </div>
        </section>
      `;
    }

    function buildTimeEntriesSummary(items) {
      const totalHours = items.reduce((sum, item) => {
        const hours = Number(item.HoursWorked ?? item.hoursWorked ?? 0);
        return sum + (Number.isNaN(hours) ? 0 : hours);
      }, 0);

      return `${items.length} entries • ${formatNumber(totalHours)} total hours`;
    }

    function read(obj, path) {
      return String(path || "").split(".").reduce((acc, key) => acc && acc[key], obj);
    }

    function hasValue(value) {
      return value !== null && value !== undefined && String(value).trim() !== "";
    }

    function formatValue(value, format) {
      if (!hasValue(value)) return "";

      if (format === "date") {
        const d = new Date(value);
        return isNaN(d) ? String(value) : d.toLocaleDateString();
      }

      if (format === "currency") {
        return formatCurrency(value);
      }

      return String(value);
    }

    function formatCurrency(value) {
      const n = Number(value);
      return Number.isNaN(n)
        ? String(value ?? "")
        : n.toLocaleString(undefined, { style: "currency", currency: "USD" });
    }

    function formatNumber(value) {
      const n = Number(value);
      return Number.isNaN(n) ? String(value ?? "") : n.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadReport();
  </script>
</body>
</html>
