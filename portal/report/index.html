<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ketter Home Improvements | Project Report</title>
  <link href="/assets/css/site.css" rel="stylesheet">
  <style>
    .report-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 1rem 2rem;
    }

    .report-shell,
    .report-section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      margin-bottom: 1rem;
    }

    .report-title {
      margin: 0 0 .35rem;
      line-height: 1.1;
    }

    .report-subtitle {
      margin: 0;
      color: #666;
      font-weight: 600;
    }

    .report-status {
      margin: 0 0 1rem;
      font-weight: 600;
    }

    .report-error {
      color: #8b1e1e;
    }

    .report-muted {
      color: #666;
    }

    .report-header-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: .85rem;
      margin-bottom: 1rem;
    }

    .report-link,
    .report-button {
      display: inline-block;
      padding: .55rem .9rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      background: #fff;
      margin-bottom: .2rem;
      cursor: pointer;
      font: inherit;
    }

    .section-title {
      margin: 0 0 .9rem;
      line-height: 1.15;
    }

    .section-summary {
      margin: 0 0 .85rem;
      color: #666;
      font-weight: 600;
      line-height: 1.35;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: .85rem;
    }

    .field-label {
      margin: 0 0 .2rem;
      font-size: .88rem;
      color: #666;
    }

    .field-value {
      margin: 0;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.3;
    }

    .paragraph-text,
    .empty-message {
      margin: 0;
      line-height: 1.5;
      color: #444;
      white-space: pre-wrap;
    }

    .item-list {
      display: grid;
      gap: .65rem;
    }

    .item-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: .85rem .95rem;
      background: #fafafa;
    }

    .item-title {
      margin: 0 0 .3rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .item-meta-inline {
      margin: 0;
      color: #555;
      line-height: 1.4;
      font-size: .95rem;
    }

    .item-summary {
      margin: .25rem 0 0;
      color: #666;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .entry-list {
      display: grid;
      gap: .65rem;
    }

    .entry-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: .85rem .95rem;
      background: #fafafa;
    }

    .entry-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: .5rem;
      margin-bottom: .45rem;
    }

    .entry-title {
      margin: 0;
      font-weight: 700;
      line-height: 1.2;
    }

    .entry-subtitle {
      margin: 0;
      color: #555;
      font-weight: 600;
      line-height: 1.2;
    }

    .entry-inline {
      margin: 0 0 .35rem;
      color: #555;
      font-weight: 600;
      line-height: 1.35;
    }

    .entry-body {
      margin: 0;
      color: #444;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .expense-list {
      display: grid;
      gap: .7rem;
    }

    .expense-group {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
      padding: .85rem .95rem;
    }

    .expense-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: .5rem;
      margin-bottom: .45rem;
    }

    .expense-vendor {
      margin: 0;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2;
    }

    .expense-amount {
      margin: 0;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1.2;
    }

    .expense-inline {
      margin: 0 0 .45rem;
      color: #555;
      font-weight: 600;
      line-height: 1.35;
    }

    .allocation-list {
      border-top: 1px solid #e5e5e5;
      padding-top: .55rem;
      display: grid;
      gap: .45rem;
    }

    .allocation-row {
      border-left: 3px solid #ddd;
      padding-left: .65rem;
    }

    .allocation-title {
      margin: 0 0 .15rem;
      font-weight: 600;
      color: #444;
      line-height: 1.35;
    }

    .allocation-amount {
      margin: 0;
      font-weight: 600;
      color: #222;
      line-height: 1.25;
    }

    .refund-list {
      display: grid;
      gap: .7rem;
    }

    .refund-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
      padding: .85rem .95rem;
    }

    .refund-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: .5rem;
      margin-bottom: .45rem;
    }

    .refund-vendor {
      margin: 0;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2;
    }

    .refund-amount {
      margin: 0;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1.2;
    }

    .refund-inline {
      margin: 0 0 .35rem;
      color: #555;
      font-weight: 600;
      line-height: 1.35;
    }

    .refund-body {
      margin: 0;
      color: #444;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .footer-nav {
      margin-top: 1rem;
      display: grid;
      gap: .75rem;
    }

    .footer-menu-link,
    .footer-menu-button {
      display: block;
      text-decoration: none;
      color: inherit;
      background: none;
      border: 0;
      padding: 0;
      width: 100%;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .footer-menu-card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .footer-menu-link:hover .footer-menu-card,
    .footer-menu-link:focus .footer-menu-card,
    .footer-menu-link:focus-visible .footer-menu-card,
    .footer-menu-button:hover .footer-menu-card,
    .footer-menu-button:focus .footer-menu-card,
    .footer-menu-button:focus-visible .footer-menu-card {
      border-color: #c9c9c9;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }

    .footer-menu-title {
      margin: 0 0 .2rem;
      font-weight: 700;
    }

    .footer-menu-text {
      margin: 0;
      color: #666;
      line-height: 1.4;
    }

    @media (min-width: 900px) {
      .field-grid {
        grid-template-columns: repeat(4, minmax(140px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="report-wrap">
    <section class="report-shell">
      <div id="report-status" class="report-status">Checking access...</div>
      <div id="report-body" class="report-muted">Please wait.</div>
      <div id="report-sections"></div>
    </section>

    <div class="footer-nav">
      <a class="footer-menu-link" id="footer-menu-link" href="#">
        <div class="footer-menu-card">
          <p class="footer-menu-title">Project Center Menu</p>
          <p class="footer-menu-text">Browse all project views and reporting options.</p>
        </div>
      </a>

      <button class="footer-menu-button" id="footer-logout-button" type="button">
        <div class="footer-menu-card">
          <p class="footer-menu-title">Log Out</p>
          <p class="footer-menu-text">End access now and require a new secure link next time.</p>
        </div>
      </button>
    </div>
  </main>

  <script>
    const PORTAL_API_URL = "https://script.google.com/macros/s/AKfycbwEJZwTBLy56OvlOLdICxNhePNZPNODmn3rELZ39ogw1VRBg1RGKLwOz3c2ny2G88WAlA/exec";

    const reportTemplate = [
      {
        key: "projectOverview",
        title: "Project Overview",
        type: "fields",
        fields: [
          { label: "Address", path: "project.ProjectAddress" },
          { label: "City", path: "project.City" },
          { label: "State", path: "project.State" },
          { label: "ZIP", path: "project.Zip" },
          { label: "Status", path: "project.Status" },
          { label: "Start Date", path: "project.StartDate", format: "date" }
        ]
      },
      {
        key: "projectScope",
        title: "Project Scope",
        type: "paragraph",
        path: "project.Notes",
        hideIfEmpty: true,
        emptyMessage: "No project scope is available."
      },
      {
        key: "timeEntries",
        title: "Time Entries",
        type: "custom",
        render: renderTimeEntriesSection
      },
      {
        key: "expensesCombined",
        title: "Expenses",
        type: "custom",
        render: renderExpensesCombinedSection
      },
      {
        key: "refunds",
        title: "Refunds",
        type: "custom",
        render: renderRefundsSection
      },
      {
        key: "documents",
        title: "Documents",
        type: "cards",
        source: "collections.documents",
        hideIfEmpty: true,
        emptyMessage: "No documents are available.",
        cardTitle: "DisplayName",
        meta: [
          { label: "Type", key: "DocumentType" },
          { label: "Status", key: "DocumentStatus" },
          { label: "Created", key: "CreatedDateTime", format: "date" }
        ],
        summary: ""
      },
      {
        key: "serviceRequests",
        title: "Related Service Requests",
        type: "cards",
        source: "collections.serviceRequests",
        hideIfEmpty: true,
        emptyMessage: "No related service requests are available.",
        cardTitle: "ServiceType",
        meta: [
          { label: "Created", key: "CreatedDateTime", format: "date" },
          { label: "Status", key: "Status" },
          { label: "Urgency", key: "Urgency" }
        ],
        summary: "IssueDescription"
      },
      {
        key: "reportTotals",
        title: "Report Totals",
        type: "custom",
        render: renderReportTotalsSection
      }
    ];

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        token: (params.get("t") || "").trim(),
        projectId: (params.get("p") || "").trim()
      };
    }

    function setFooterMenuLink(token) {
      const link = document.getElementById("footer-menu-link");
      if (!link) return;

      if (token) {
        link.href = "/portal/menu/?t=" + encodeURIComponent(token);
      } else {
        link.href = "#";
      }
    }

    function setLogoutAction(token) {
      const button = document.getElementById("footer-logout-button");
      if (!button) return;

      button.disabled = !token;

      button.addEventListener("click", async function() {
        if (!token) {
          window.location.href = "/portal/";
          return;
        }

        const confirmed = window.confirm("Log out of Project Center?");
        if (!confirmed) return;

        try {
          button.disabled = true;
          const url = PORTAL_API_URL + "?mode=logout&t=" + encodeURIComponent(token);
          await fetch(url, { method: "GET" });
        } catch (error) {
          // ignore and still redirect out
        }

        window.location.href = "/portal/";
      });
    }

    async function loadReport() {
      const statusEl = document.getElementById("report-status");
      const bodyEl = document.getElementById("report-body");
      const sectionsEl = document.getElementById("report-sections");
      const { token, projectId } = getParams();

      setFooterMenuLink(token);
      setLogoutAction(token);

      if (!token) {
        statusEl.textContent = "Access denied";
        bodyEl.innerHTML = '<p class="report-error">This link is missing an access token.</p>';
        sectionsEl.innerHTML = "";
        return;
      }

      if (!projectId) {
        statusEl.textContent = "Project not found";
        bodyEl.innerHTML = `
          <p class="report-error">This link is missing a project selection.</p>
          <a class="report-link" href="/portal/?t=${encodeURIComponent(token)}">Back to Projects</a>
        `;
        sectionsEl.innerHTML = "";
        return;
      }

      try {
        const url = PORTAL_API_URL + "?t=" + encodeURIComponent(token) + "&p=" + encodeURIComponent(projectId);
        const response = await fetch(url, { method: "GET" });
        const data = await response.json();

        if (!data.success) {
          statusEl.textContent = "Access denied";
          bodyEl.innerHTML = '<p class="report-error">' + escapeHtml(data.message || "Access failed.") + '</p>';
          sectionsEl.innerHTML = "";
          return;
        }

        statusEl.style.display = "none";
        bodyEl.innerHTML = `
          <div class="report-header-bar">
            <div>
              <p class="report-subtitle">Project Report for:</p>
              <h1 class="report-title">${escapeHtml(read(data, "project.ProjectName") || "Project Report")}</h1>
            </div>
            <div>
              <a class="report-link" href="/portal/?t=${encodeURIComponent(token)}">Back to Projects</a>
            </div>
          </div>
        `;

        sectionsEl.innerHTML = renderTemplate(reportTemplate, data);
      } catch (error) {
        statusEl.textContent = "Service unavailable";
        bodyEl.innerHTML = '<p class="report-error">Unable to load report right now.</p>';
        sectionsEl.innerHTML = "";
      }
    }

    function renderTemplate(template, data) {
      const sections = template
        .map(section => renderSection(section, data))
        .filter(Boolean);

      if (!sections.length) {
        return `
          <section class="report-section">
            <h2 class="section-title">Report</h2>
            <p class="empty-message">No report sections are available yet.</p>
          </section>
        `;
      }

      return sections.join("");
    }

    function renderSection(section, data) {
      if (section.type === "fields") return renderFieldsSection(section, data);
      if (section.type === "paragraph") return renderParagraphSection(section, data);
      if (section.type === "cards") return renderCardsSection(section, data);
      if (section.type === "custom") return section.render(section, data);
      return "";
    }

    function renderFieldsSection(section, data) {
      const fields = (section.fields || []).filter(field => hasValue(read(data, field.path)));
      if (!fields.length && section.hideIfEmpty) return "";

      const content = fields.length
        ? `
          <div class="field-grid">
            ${fields.map(field => `
              <div>
                <p class="field-label">${escapeHtml(field.label || "")}</p>
                <p class="field-value">${escapeHtml(formatValue(read(data, field.path), field.format))}</p>
              </div>
            `).join("")}
          </div>
        `
        : `<p class="empty-message">${escapeHtml(section.emptyMessage || "No information is available.")}</p>`;

      return `
        <section class="report-section">
          <h2 class="section-title">${escapeHtml(section.title || "Section")}</h2>
          ${content}
        </section>
      `;
    }

    function renderParagraphSection(section, data) {
      const value = read(data, section.path);
      if (!hasValue(value) && section.hideIfEmpty) return "";

      return `
        <section class="report-section">
          <h2 class="section-title">${escapeHtml(section.title || "Section")}</h2>
          <p class="paragraph-text">${escapeHtml(hasValue(value) ? String(value) : (section.emptyMessage || "No information is available."))}</p>
        </section>
      `;
    }

    function renderCardsSection(section, data) {
      const items = read(data, section.source) || [];
      if ((!Array.isArray(items) || !items.length) && section.hideIfEmpty) return "";

      const content = Array.isArray(items) && items.length
        ? `
          <div class="item-list">
            ${items.map(item => {
              const metaText = (section.meta || [])
                .map(meta => {
                  const value = formatValue(item[meta.key], meta.format);
                  return hasValue(value) ? `${meta.label}: ${value}` : "";
                })
                .filter(Boolean)
                .join(" • ");

              return `
                <div class="item-card">
                  <p class="item-title">${escapeHtml(item[section.cardTitle] || "Item")}</p>
                  ${metaText ? `<p class="item-meta-inline">${escapeHtml(metaText)}</p>` : ""}
                  ${section.summary && hasValue(item[section.summary]) ? `<p class="item-summary">${escapeHtml(item[section.summary])}</p>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        `
        : `<p class="empty-message">${escapeHtml(section.emptyMessage || "No items are available.")}</p>`;

      return `
        <section class="report-section">
          <h2 class="section-title">${escapeHtml(section.title || "Section")}</h2>
          ${content}
        </section>
      `;
    }

    function renderTimeEntriesSection(section, data) {
      const items = read(data, "collections.timeEntries") || [];
      if (!Array.isArray(items) || !items.length) return "";

      const summary = buildTimeEntriesSummary(items);

      return `
        <section class="report-section">
          <h2 class="section-title">Time Entries</h2>
          <p class="section-summary">${escapeHtml(summary)}</p>
          <div class="entry-list">
            ${items.map(item => `
              <div class="entry-card">
                <div class="entry-top">
                  <p class="entry-title">${escapeHtml(item.WorkerName ?? item.workerName ?? "")}</p>
                  <p class="entry-subtitle">${escapeHtml(formatValue(item.TimeDate ?? item.timeDate, "date"))}</p>
                </div>
                <p class="entry-inline">Hours: ${escapeHtml(formatNumber(item.HoursWorked ?? item.hoursWorked ?? ""))}</p>
                <p class="entry-body">${escapeHtml(item.Description ?? item.description ?? "")}</p>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderExpensesCombinedSection(section, data) {
      const expenses = read(data, "collections.expenses") || [];
      const allocations = read(data, "collections.expenseAllocations") || [];

      if ((!Array.isArray(expenses) || !expenses.length) && (!Array.isArray(allocations) || !allocations.length)) {
        return "";
      }

      const allocationMap = {};
      allocations.forEach(item => {
        const expenseId = String(item.ExpenseID || item.expenseId || "").trim();
        if (!expenseId) return;
        if (!allocationMap[expenseId]) allocationMap[expenseId] = [];
        allocationMap[expenseId].push(item);
      });

      const totalExpenses = expenses.reduce((sum, item) => {
        const amount = Number(item.TotalAmount ?? item.totalAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      const totalAllocated = allocations.reduce((sum, item) => {
        const amount = Number(item.AllocatedAmount ?? item.allocatedAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      return `
        <section class="report-section">
          <h2 class="section-title">Expenses</h2>
          <p class="section-summary">
            Total Expenses: ${escapeHtml(formatCurrency(totalExpenses))} •
            Total Allocated: ${escapeHtml(formatCurrency(totalAllocated))}
          </p>
          <div class="expense-list">
            ${expenses.map(item => {
              const expenseId = String(item.ExpenseID || item.expenseId || "").trim();
              const relatedAllocations = allocationMap[expenseId] || [];
              const vendorLabel =
                item.VendorName ||
                item.vendorName ||
                item.VendorRef ||
                item.vendorRef ||
                item.VendorID ||
                item.vendorId ||
                "Vendor not set";
              const amount = item.TotalAmount ?? item.totalAmount ?? "";
              const date = item.ExpenseDate ?? item.expenseDate ?? "";
              const allocatedTotal = relatedAllocations.reduce((sum, allocation) => {
                const value = Number(allocation.AllocatedAmount ?? allocation.allocatedAmount ?? 0);
                return sum + (Number.isNaN(value) ? 0 : value);
              }, 0);

              return `
                <div class="expense-group">
                  <div class="expense-top">
                    <p class="expense-vendor">${escapeHtml(String(vendorLabel))}</p>
                    <p class="expense-amount">${escapeHtml(formatValue(amount, "currency"))}</p>
                  </div>
                  <p class="expense-inline">
                    ${escapeHtml(formatValue(date, "date"))}
                    ${relatedAllocations.length ? " • Allocated: " + escapeHtml(formatCurrency(allocatedTotal)) : ""}
                  </p>
                  <div class="allocation-list">
                    ${relatedAllocations.length
                      ? relatedAllocations.map(allocation => `
                        <div class="allocation-row">
                          <p class="allocation-title">${escapeHtml(String(item.Description ?? item.description ?? "Allocation"))}</p>
                          <p class="allocation-amount">${escapeHtml(formatValue(allocation.AllocatedAmount ?? allocation.allocatedAmount, "currency"))}</p>
                        </div>
                      `).join("")
                      : `
                        <div class="allocation-row">
                          <p class="allocation-title">${escapeHtml(String(item.Description ?? item.description ?? "Expense"))}</p>
                          <p class="allocation-amount">${escapeHtml(formatValue(amount, "currency"))}</p>
                        </div>
                      `
                    }
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderRefundsSection(section, data) {
      const refunds = read(data, "collections.refunds") || [];
      if (!Array.isArray(refunds) || !refunds.length) return "";

      const totalRefunds = refunds.reduce((sum, item) => {
        const amount = Number(item.RefundAmount ?? item.refundAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      return `
        <section class="report-section">
          <h2 class="section-title">Refunds</h2>
          <p class="section-summary">
            Total Refunds: ${escapeHtml(formatCurrency(totalRefunds))}
          </p>
          <div class="refund-list">
            ${refunds.map(item => {
              const vendorLabel =
                item.VendorName ||
                item.vendorName ||
                item.VendorRef ||
                item.vendorRef ||
                item.VendorID ||
                item.vendorId ||
                "Vendor not set";

              return `
                <div class="refund-card">
                  <div class="refund-top">
                    <p class="refund-vendor">${escapeHtml(String(vendorLabel))}</p>
                    <p class="refund-amount">${escapeHtml(formatValue(item.RefundAmount ?? item.refundAmount, "currency"))}</p>
                  </div>
                  <p class="refund-inline">
                    ${escapeHtml(formatValue(item.RefundDate ?? item.refundDate, "date"))}
                    ${hasValue(item.RefundRef ?? item.refundRef) ? " • " + escapeHtml(String(item.RefundRef ?? item.refundRef)) : ""}
                  </p>
                  ${hasValue(item.RefundReason ?? item.refundReason)
                    ? `<p class="refund-body">${escapeHtml(String(item.RefundReason ?? item.refundReason))}</p>`
                    : ""}
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderReportTotalsSection(section, data) {
      const timeEntries = read(data, "collections.timeEntries") || [];
      const expenses = read(data, "collections.expenses") || [];
      const refunds = read(data, "collections.refunds") || [];
      const allocations = read(data, "collections.expenseAllocations") || [];
      const documents = read(data, "collections.documents") || [];
      const serviceRequests = read(data, "collections.serviceRequests") || [];

      const totalHours = timeEntries.reduce((sum, item) => {
        const hours = Number(item.HoursWorked ?? item.hoursWorked ?? 0);
        return sum + (Number.isNaN(hours) ? 0 : hours);
      }, 0);

      const totalLaborValue = timeEntries.reduce((sum, item) => {
        const hours = Number(item.HoursWorked ?? item.hoursWorked ?? 0);
        const rate = Number(item.HourlyRate ?? item.hourlyRate ?? 0);
        if (Number.isNaN(hours) || Number.isNaN(rate)) return sum;
        return sum + (hours * rate);
      }, 0);

      const totalExpenses = expenses.reduce((sum, item) => {
        const amount = Number(item.TotalAmount ?? item.totalAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      const totalRefunds = refunds.reduce((sum, item) => {
        const amount = Number(item.RefundAmount ?? item.refundAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      const totalAllocated = allocations.reduce((sum, item) => {
        const amount = Number(item.AllocatedAmount ?? item.allocatedAmount ?? 0);
        return sum + (Number.isNaN(amount) ? 0 : amount);
      }, 0);

      return `
        <section class="report-section">
          <h2 class="section-title">Report Totals</h2>
          <div class="field-grid">
            <div>
              <p class="field-label">Total Time Entries</p>
              <p class="field-value">${escapeHtml(String(timeEntries.length))}</p>
            </div>
            <div>
              <p class="field-label">Total Hours</p>
              <p class="field-value">${escapeHtml(formatNumber(totalHours))}</p>
            </div>
            <div>
              <p class="field-label">Estimated Labor Value</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalLaborValue))}</p>
            </div>
            <div>
              <p class="field-label">Total Expenses</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalExpenses))}</p>
            </div>
            <div>
              <p class="field-label">Total Refunds</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalRefunds))}</p>
            </div>
            <div>
              <p class="field-label">Net Expenses</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalExpenses - totalRefunds))}</p>
            </div>
            <div>
              <p class="field-label">Total Allocated</p>
              <p class="field-value">${escapeHtml(formatCurrency(totalAllocated))}</p>
            </div>
            <div>
              <p class="field-label">Document Count</p>
              <p class="field-value">${escapeHtml(String(documents.length))}</p>
            </div>
            <div>
              <p class="field-label">Related Service Requests</p>
              <p class="field-value">${escapeHtml(String(serviceRequests.length))}</p>
            </div>
          </div>
        </section>
      `;
    }

    function buildTimeEntriesSummary(items) {
      const totalHours = items.reduce((sum, item) => {
        const hours = Number(item.HoursWorked ?? item.hoursWorked ?? 0);
        return sum + (Number.isNaN(hours) ? 0 : hours);
      }, 0);

      return `${items.length} entries • ${formatNumber(totalHours)} total hours`;
    }

    function read(obj, path) {
      return String(path || "").split(".").reduce((acc, key) => acc && acc[key], obj);
    }

    function hasValue(value) {
      return value !== null && value !== undefined && String(value).trim() !== "";
    }

    function formatValue(value, format) {
      if (!hasValue(value)) return "";

      if (format === "date") {
        const d = new Date(value);
        return isNaN(d) ? String(value) : d.toLocaleDateString();
      }

      if (format === "currency") {
        return formatCurrency(value);
      }

      return String(value);
    }

    function formatCurrency(value) {
      const n = Number(value);
      return Number.isNaN(n)
        ? String(value ?? "")
        : n.toLocaleString(undefined, { style: "currency", currency: "USD" });
    }

    function formatNumber(value) {
      const n = Number(value);
      return Number.isNaN(n) ? String(value ?? "") : n.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadReport();
  </script>
</body>
</html>
