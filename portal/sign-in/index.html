<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ketter Home Improvements | Portal Sign-In</title>
  <link href="/assets/css/site.css" rel="stylesheet">
  <style>
    .signin-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .signin-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .signin-title {
      margin: 0 0 1rem;
    }
    .signin-help {
      color: #666;
      margin-bottom: 1rem;
    }
    .form-row {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font: inherit;
      box-sizing: border-box;
    }
    button {
      padding: 0.8rem 1rem;
      border: 1px solid #222;
      background: #222;
      color: #fff;
      border-radius: 8px;
      font: inherit;
      cursor: pointer;
    }
    .fine-print {
      margin-top: 1rem;
      color: #666;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="signin-wrap">
    <div class="signin-card">
      <h1 class="signin-title">Client Portal Sign-In</h1>
      <p class="signin-help">Enter the email address and ZIP code associated with your account. If your information matches our records, we will email you a secure sign-in link.</p>

      <form method="post" action="https://script.google.com/macros/s/AKfycbyKZJythlKKWbaT57pIJYmj69kvAedP31TtUXErr4nsuchx3aHzh5t75PukLWs-Kjg9aw/exec?action=requestmagiclink">
        <div class="form-row">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="form-row">
          <label for="zip">ZIP code</label>
          <input id="zip" name="zip" type="text" inputmode="numeric" autocomplete="postal-code" required>
        </div>

        <button type="submit">Email Me a Sign-In Link</button>
      </form>

      <p class="fine-print">After you submit, you will be taken to a confirmation page.</p>
    </div>
  </main>
</body>
</html>
