<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ketter Home Improvements | Portal Sign-In</title>
  <link href="/assets/css/site.css" rel="stylesheet">
  <style>
    .signin-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .signin-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .signin-title {
      margin: 0 0 1rem;
    }
    .signin-help {
      color: #666;
      margin-bottom: 1rem;
    }
    .form-row {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font: inherit;
      box-sizing: border-box;
    }
    button {
      padding: 0.8rem 1rem;
      border: 1px solid #222;
      background: #222;
      color: #fff;
      border-radius: 8px;
      font: inherit;
      cursor: pointer;
    }
    .status {
      margin-top: 1rem;
      color: #444;
    }
    .error {
      color: #8b1e1e;
    }
  </style>
</head>
<body>
  <main class="signin-wrap">
    <div class="signin-card">
      <h1 class="signin-title">Client Portal Sign-In</h1>
      <p class="signin-help">Enter the email address and ZIP code associated with your account. If your information matches our records, we will email you a secure sign-in link.</p>

      <form id="signin-form">
        <div class="form-row">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="form-row">
          <label for="zip">ZIP code</label>
          <input id="zip" name="zip" type="text" inputmode="numeric" autocomplete="postal-code" required>
        </div>

        <button type="submit" id="submit-btn">Email Me a Sign-In Link</button>
      </form>

      <div id="status" class="status"></div>
    </div>
  </main>

  <script>
    const PORTAL_API_URL = "https://script.google.com/macros/s/AKfycbyKZJythlKKWbaT57pIJYmj69kvAedP31TtUXErr4nsuchx3aHzh5t75PukLWs-Kjg9aw/exec";

    document.getElementById("signin-form").addEventListener("submit", async function(event) {
      event.preventDefault();

      const statusEl = document.getElementById("status");
      const submitBtn = document.getElementById("submit-btn");
      const email = document.getElementById("email").value.trim();
      const zip = document.getElementById("zip").value.trim();

      statusEl.textContent = "";
      statusEl.className = "status";
      submitBtn.disabled = true;
      submitBtn.textContent = "Sending...";

      try {
        const response = await fetch(PORTAL_API_URL + "?action=requestmagiclink", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            zip: zip
          })
        });

        const data = await response.json();

        statusEl.textContent = data.message || "If your account information matches our records, a sign-in link has been sent.";
      } catch (error) {
        statusEl.textContent = "Unable to process your request right now.";
        statusEl.className = "status error";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Email Me a Sign-In Link";
      }
    });
  </script>
</body>
</html>
