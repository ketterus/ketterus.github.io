<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ketter Home Improvements | Client Portal</title>
  <link href="/assets/css/site.css" rel="stylesheet">
  <style>
    .portal-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .portal-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      margin-bottom: 1rem;
    }

    .portal-title {
      margin: 0 0 .5rem;
      line-height: 1.1;
    }

    .portal-status {
      margin: 0 0 .75rem;
      font-weight: 600;
    }

    .portal-muted {
      color: #666;
    }

    .portal-error {
      color: #8b1e1e;
    }

    .portal-intro {
      margin: 0;
      line-height: 1.45;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: .75rem;
      margin-top: .75rem;
    }

    .summary-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: .85rem 1rem;
      background: #fafafa;
    }

    .summary-label {
      margin: 0 0 .2rem;
      font-size: .9rem;
      color: #666;
    }

    .summary-value {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .project-list {
      display: grid;
      gap: .85rem;
      margin-top: 1rem;
    }

    .project-item {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1rem;
      background: #fafafa;
    }

    .project-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: start;
      gap: .75rem;
      margin-bottom: .75rem;
    }

    .project-name {
      margin: 0;
      font-weight: 700;
      line-height: 1.25;
    }

    .project-status {
      margin: 0;
      color: #555;
      font-weight: 600;
      white-space: nowrap;
    }

    .project-link {
      display: inline-block;
      padding: .55rem .9rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="portal-wrap">
    <div class="portal-card">
      <h1 class="portal-title">Client Portal</h1>
      <div id="portal-status" class="portal-status">Checking access...</div>
      <div id="portal-body" class="portal-muted">Please wait.</div>
    </div>
  </main>

  <script>
    const PORTAL_API_URL = "https://script.google.com/macros/s/AKfycbwEJZwTBLy56OvlOLdICxNhePNZPNODmn3rELZ39ogw1VRBg1RGKLwOz3c2ny2G88WAlA/exec";

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("t") || "").trim();
    }

    async function loadPortal() {
      const statusEl = document.getElementById("portal-status");
      const bodyEl = document.getElementById("portal-body");
      const token = getToken();

      if (!token) {
        statusEl.textContent = "Access denied";
        bodyEl.innerHTML = '<p class="portal-error">This link is missing an access token.</p>';
        return;
      }

      try {
        const url = PORTAL_API_URL + "?t=" + encodeURIComponent(token);
        const response = await fetch(url, { method: "GET" });
        const data = await response.json();

        if (!data.success) {
          statusEl.textContent = "Access denied";
          bodyEl.innerHTML = '<p class="portal-error">' + escapeHtml(data.message || "Access failed.") + '</p>';
          return;
        }

        const projects = (data.data && Array.isArray(data.data.projects)) ? data.data.projects : [];
        const statusSummary = summarizeStatuses(projects);

        statusEl.textContent = "Portal active";

        bodyEl.innerHTML = `
          <p class="portal-intro">Welcome, <strong>${escapeHtml(data.client.clientName || "Client")}</strong>.</p>
          <p class="portal-intro portal-muted" style="margin-top:.25rem;">Select a project to open its report.</p>
          ${renderStatusSummary(statusSummary)}
          ${renderProjects(projects, token)}
        `;
      } catch (error) {
        statusEl.textContent = "Service unavailable";
        bodyEl.innerHTML = '<p class="portal-error">Unable to load portal right now.</p>';
      }
    }

    function summarizeStatuses(projects) {
      const summary = {
        total: projects.length,
        active: 0,
        new: 0,
        other: 0
      };

      projects.forEach(project => {
        const status = String(project.status || "").trim().toLowerCase();

        if (status === "active") {
          summary.active += 1;
        } else if (status === "new") {
          summary.new += 1;
        } else {
          summary.other += 1;
        }
      });

      return summary;
    }

    function renderStatusSummary(summary) {
      return `
        <div class="summary-grid">
          <div class="summary-card">
            <p class="summary-label">Total Projects</p>
            <p class="summary-value">${escapeHtml(String(summary.total))}</p>
          </div>
          <div class="summary-card">
            <p class="summary-label">Active</p>
            <p class="summary-value">${escapeHtml(String(summary.active))}</p>
          </div>
          <div class="summary-card">
            <p class="summary-label">New</p>
            <p class="summary-value">${escapeHtml(String(summary.new))}</p>
          </div>
          <div class="summary-card">
            <p class="summary-label">Other</p>
            <p class="summary-value">${escapeHtml(String(summary.other))}</p>
          </div>
        </div>
      `;
    }

    function renderProjects(projects, token) {
      if (!projects.length) {
        return '<p class="portal-muted" style="margin-top:1rem;">No projects have been shared to your portal yet.</p>';
      }

      return `
        <div class="project-list">
          ${projects.map(project => `
            <div class="project-item">
              <div class="project-top">
                <p class="project-name">${escapeHtml(project.projectName || "Unnamed Project")}</p>
                <p class="project-status">Status: ${escapeHtml(project.status || "Not set")}</p>
              </div>
              <a class="project-link" href="/portal/report/?t=${encodeURIComponent(token)}&p=${encodeURIComponent(project.projectId || "")}">View Report</a>
            </div>
          `).join("")}
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadPortal();
  </script>
</body>
</html>
