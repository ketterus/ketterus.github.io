<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ketter Home Improvements | Client Portal</title>
  <link href="/assets/css/site.css" rel="stylesheet">
  <style>
    .portal-wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .portal-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .portal-title {
      margin: 0 0 1rem;
    }
    .portal-status {
      margin: 0 0 1rem;
      font-weight: 600;
    }
    .portal-muted {
      color: #666;
    }
    .portal-error {
      color: #8b1e1e;
    }
  </style>
</head>
<body>
  <main class="portal-wrap">
    <div class="portal-card">
      <h1 class="portal-title">Client Portal</h1>
      <div id="portal-status" class="portal-status">Checking access...</div>
      <div id="portal-body" class="portal-muted">Please wait.</div>
    </div>
  </main>

  <script>
    const PORTAL_API_URL = "https://script.google.com/macros/s/AKfycbyKZJythlKKWbaT57pIJYmj69kvAedP31TtUXErr4nsuchx3aHzh5t75PukLWs-Kjg9aw/exec";

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("t") || "").trim();
    }

    async function loadPortal() {
      const statusEl = document.getElementById("portal-status");
      const bodyEl = document.getElementById("portal-body");
      const token = getToken();

      if (!token) {
        statusEl.textContent = "Access denied";
        bodyEl.innerHTML = '<p class="portal-error">This link is missing an access token.</p>';
        return;
      }

      try {
        const url = PORTAL_API_URL + "?t=" + encodeURIComponent(token);
        const response = await fetch(url, { method: "GET" });
        const data = await response.json();

        if (!data.success) {
          statusEl.textContent = "Access denied";
          bodyEl.innerHTML = '<p class="portal-error">' + escapeHtml(data.message || "Access failed.") + '</p>';
          return;
        }

        statusEl.textContent = "Portal active";
        bodyEl.innerHTML = `
          <p>Welcome, <strong>${escapeHtml(data.client.clientName || "Client")}</strong>.</p>
          <p class="portal-muted">Your portal is active.</p>
          <p class="portal-muted">No reports are available yet.</p>
        `;
      } catch (error) {
        statusEl.textContent = "Service unavailable";
        bodyEl.innerHTML = '<p class="portal-error">Unable to load portal right now.</p>';
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadPortal();
  </script>
</body>
</html>
